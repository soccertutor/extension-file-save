name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.6

      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-mac-arm64-${{ hashFiles('haxelib.json') }}
          restore-keys: haxelib-mac-arm64-

      - name: Install dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          haxelib install lime --quiet
          haxelib dev extension-file-save .

      - name: Build macOS ARM64
        run: haxelib run lime rebuild . macos -release

      - name: Upload ndll artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-file-save-macos-arm64
          path: ndll/MacArm64/
